name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

env:
  GOLANGCI_LINT_VERSION: "v2.10.1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fix:
    name: Auto-fix
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run make fix
        run: make fix

      - name: Commit changes
        id: auto-commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: run make fix"
          file_pattern: "*.go go.mod go.sum"
          skip_ci: false

      - name: Comment on PR
        if: github.event_name == 'pull_request' && steps.auto-commit.outputs.changes_detected == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '## 🔧 Auto-fix Applied\n\n`make fix` has been run and changes have been committed automatically.\n\nThe full CI pipeline will run on this commit.'
            });

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [fix]
    if: always() && (needs.fix.result == 'success' || needs.fix.result == 'skipped')
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: make test

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
        continue-on-error: true

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [fix]
    if: always() && (needs.fix.result == 'success' || needs.fix.result == 'skipped')
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [fix]
    if: always() && (needs.fix.result == 'success' || needs.fix.result == 'skipped')
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: make build
