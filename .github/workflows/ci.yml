name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

env:
  GOLANGCI_LINT_VERSION: "v2.10.1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fix:
    name: Check make fix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run make fix
        run: make fix

      - name: Check for uncommitted changes
        run: |
          if ! git diff --exit-code || ! git diff --cached --exit-code; then
            echo "❌ make fix produced changes. Please run 'make fix' locally and commit the changes."
            git diff
            exit 1
          fi
          echo "✅ No changes needed from make fix"

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [fix]
    if: always() && (needs.fix.result == 'success' || needs.fix.result == 'skipped')
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: make test

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
        continue-on-error: true

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [fix]
    if: always() && (needs.fix.result == 'success' || needs.fix.result == 'skipped')
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [fix]
    if: always() && (needs.fix.result == 'success' || needs.fix.result == 'skipped')
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: make build
